<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Aula 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        div{
            border: 1px solid chartreuse;
        }
    </style>
</head>

<body>
    
    <div class="container text-center">
        <div class="row"> <!--cria uma linha-->
            <div class="col-4">
                Coluna 1
            </div>
            <div class="col-4">
                Coluna 2
            </div>
            <div class="col-4">
                Coluna 3
            </div>
        </div>
    </div>
    <p>Container SM</p>
    <div class="container-sm text-center">
        <div class="row"> <!--cria uma linha-->
            <div class="col">
                Coluna 1 sm
            </div>
            <div class="col">
                Coluna 2 sm
            </div>
            <div class="col">
                Coluna 3 sm
            </div>
        </div>
    </div>
    <p>Container MD</p>
    <div class="container-md text-center">
        <div class="row"> <!--cria uma linha-->
            <div class="col">
                Coluna 1 md
            </div>
            <div class="col">
                Coluna 2 md
            </div>
            <div class="col">
                Coluna 3 md
            </div>
        </div>
    </div>
    <p>Container LG</p>
    <div class="container-lg text-center">
        <div class="row"> <!--cria uma linha-->
            <div class="col">
                Coluna 1 lg
            </div>
            <div class="col">
                Coluna 2 lg
            </div>
            <div class="col">
                Coluna 3 lg
            </div>
        </div>
    </div>
    <p>Container XL</p>
    <div class="container-xl text-center">
        <div class="row"> <!--cria uma linha-->
            <div class="col">
                Coluna 1 xl
            </div>
            <div class="col">
                Coluna 2 xl
            </div>
            <div class="col">
                Coluna 3 xl
            </div>
        </div>
    </div>
     <p>Container XXL</p>
    <div class="container-xxl text-center text-secundary p-3 bg-info bg-opacity-10 border border-info border-start rounded">
        <div class="row"> <!--cria uma linha-->
            <div class="col">
                Coluna 1 xxl
            </div>
            <div class="col">
                Coluna 2 xxl
            </div>
            <div class="col">
                Coluna 3 xxl
            </div>
        </div>
    </div>
</body>
</html>
